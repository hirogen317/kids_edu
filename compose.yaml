services:
  db:
    image: postgres:17-bookworm
    container_name: kids-edu-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kids_edu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kids_edu}
      POSTGRES_DB: ${POSTGRES_DB:-kids_edu}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-kids_edu} -d ${POSTGRES_DB:-kids_edu}
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
